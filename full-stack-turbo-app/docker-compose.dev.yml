version: "3.8"
services:
  nest_rest_api:
    build:
      context: ./apps/nest_rest_api
      dockerfile: Dockerfile.dev
      target: development
    ports:
      - "3000:3000"
    develop:
      watch:
        - action: sync
          path: ./apps/nest_rest_api
          target: /app
          ignore:
            - node_modules
            - .git/
        - action: rebuild
          path: ./apps/nest_rest_api/package.json
        - action: sync+restart
          path: ./apps/nest_rest_api
          target: /app

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
      target: development
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: ./apps/web
          target: /app
          ignore:
            - node_modules
            - .git/
        - action: rebuild
          path: ./apps/web/package.json
        - action: sync+restart
          path: ./apps/web
          target: /app
